<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FesLite — 펀딩 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <script defer th:src="@{/js/address.js}"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #ffdee9, #b5fffc);
        }



        .form-section {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #7b61ff, #54d6ff);
            color: #fff !important;
            /* 항상 흰색 유지 */
            border: none;
            box-shadow: 0 4px 12px rgba(123, 97, 255, 0.4);
            transition: all 0.25s ease;
            border-radius: 10px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
            /* 가독성 보정 */
        }

        .btn-gradient:hover,
        .btn-gradient:focus,
        .btn-gradient:active {
            color: #fff !important;
            /* hover/클릭시 흰색 고정 */
            background: linear-gradient(90deg, #866bff, #65d3ff);
            /* 살짝 밝은 톤 */
            box-shadow: 0 6px 18px rgba(123, 97, 255, 0.6);
            transform: translateY(-2px);
            opacity: 1;
            /* 밝기 변동 제거 */
        }

        ㄹ .btn-gradient:hover {
            opacity: 0.9;
        }

        #feeAmountWrap {
            display: none;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .floating-icon {
            animation: float 2s ease-in-out infinite;
            display: inline-block;
            /* 추가 포인트 */
        }

        @keyframes shine {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.4);
            }
        }

        .floating-icon {
            animation: float 2s ease-in-out infinite, shine 3s ease-in-out infinite alternate;
            /* 아이콘 반짝임 추가 */
        }

        .form-control:focus {
            border-color: #7b61ff;
            box-shadow: 0 0 0 0.25rem rgba(123, 97, 255, 0.25);
            transition: box-shadow 0.2s ease;
            /* 호버 부드러운 전환 효과 */
        }

        .floating-icon {
            width: 150px;
            max-width: 40%;
            height: auto;
            animation: float 2s ease-in-out infinite, shine 3s ease-in-out infinite alternate;
            /* 아이콘 크게 모바일에서는 작게*/
        }
    </style>
</head>

<body class="funding-bg">
    <header class="border-bottom bg-white bg-opacity-75 backdrop-blur sticky-top">
        <div class="container d-flex align-items-center gap-3 py-2">
            <a class="navbar-brand fw-bold" th:href="@{/funding/main}">FesLite Funding</a>
            <nav class="small text-muted">펀딩 등록</nav>
        </div>
    </header>

    <main class="py-5">
        <div class="container" style="max-width:820px">
            <div class="text-center mb-4">
                <img th:src="@{/images/funding_image.png}" alt="펀딩 등록 아이콘" width="90" class="mb-3 floating-icon">
                <h2 class="fw-bold">새로운 펀딩 등록</h2>
                <p class="text-muted">축제 펀딩 정보를 입력해주세요. 정확한 정보일수록 신뢰도가 높아집니다.</p>
            </div>


            <form th:action="@{/funding/register}" method="post" th:object="${funding}" id="fundingForm" class="form-section vstack gap-3" enctype="multipart/form-data">
                <!-- 기본정보 -->
                <div>
                    <label class="form-label">축제명</label>
                    <input type="text" name="festival_name" th:field="*{festival_name}" class="form-control" placeholder="예: 한강 불꽃축제 시민참여 펀딩"
                        required />
                </div>

                <div>
                    <label class="form-label">짧은 소개</label>
                    <input type="text" name="festival_short" th:field="*{festival_short}" maxlength="200" class="form-control"
                        placeholder="예: 시민이 함께 만드는 불꽃쇼 무대" required />
                </div>

                <div>
                    <label class="form-label">상세 설명</label>
                    <textarea name="festival_info" th:field="*{festival_info}" class="form-control" rows="5"
                        placeholder="축제의 취지, 기대효과, 예산 사용 계획 등을 자세히 작성해주세요." required></textarea>
                </div>

                <!-- 카테고리 / 주최 -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">카테고리</label>
                        <select name="festival_category_idx" th:field="*{festival_category_idx}" class="form-select" required>
                            <option th:value="${cat.festival_category_idx}" th:each="cat : ${category}" th:text="${cat.festival_category_name}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">주최 / 주관</label>
                        <input type="text" name="festival_host" th:field="*{festival_host}" class="form-control" placeholder="예: FesLite 조직위원회" />
                    </div>
                </div>

                <!-- 일정 -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">시작일</label>
                        <input type="date" name="festival_begin_date" th:field="*{festival_begin_date}"  class="form-control" required />
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">종료일</label>
                        <input type="date" name="festival_end_date" th:field="*{festival_end_date}" class="form-control" required />
                    </div>
                </div>

                <!-- 목표 금액 -->
                <div>
                    <label class="form-label">목표 금액 (원)</label>
                    <input type="number" name="festival_total_amount" th:field="*{festival_total_amount}" class="form-control" placeholder="예: 50000000"
                        required />
                    <label class="form-label">펀딩 마감일</label>
                    <input type="date" name="funding_end_date" th:field="*{funding_end_date}"  class="form-control" required />
                </div>

                <!-- 입장료 -->
                <div>
                    <label class="form-label">입장료</label>
                    <div class="d-flex align-items-center gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="feeType" id="feeFree" value="무료" checked>
                            <label class="form-check-label" for="feeFree">무료</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="feeType" id="feePaid" value="유료">
                            <label class="form-check-label" for="feePaid">유료</label>
                        </div>
                    </div>
                    <div id="feeAmountWrap" class="mt-2">
                        <input type="number" name="festival_fee" class="form-control" placeholder="금액 입력 (예: 10000)" />
                    </div>

                    <!-- 서버로 전달될 최종 요금 -->
                    <input type="hidden" name="festival_fee" id="festival_fee_hidden" th:field="*{festival_fee}" />
                </div>

                <!-- 장소 및 계좌 -->
                <div>
                    <label class="form-label">주소</label><br>
                    <input type="hidden" id="sample6_postcode" placeholder="우편번호">
                    <input type="hidden" id="sample6_detailAddress" placeholder="상세주소">
                    <input type="hidden" id="sample6_extraAddress" placeholder="참고항목">
                    <input type="button" onclick="sample6_execDaumPostcode()" value="주소 찾기"><br>
                    <input type="text" id="sample6_address" th:field="*{festival_address}" placeholder="주소를 입력하세요" required>
                </div>

                <div>
                    <label class="form-label">기업 계좌번호</label>
                    <input type="text" name="company_account" th:field="*{company_account}" class="form-control"
                        placeholder="예: 하나은행 123-456789-00-000" />
                </div>

                <!-- 대표 이미지 / 첨부 파일 -->
                <div>
                    <label class="form-label">대표 이미지 업로드</label>
                    <input type="file" name="img_path" class="form-control" accept="image/*"/>
                    <div class="form-text">※ JPG, PNG 형식의 이미지를 선택해주세요.</div>
                </div>

                <div>
                    <label class="form-label">추가 첨부 파일 (포스터,기획서 등)</label>
                    <input type="file" name="file" class="form-control" />
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-gradient px-5 py-2 fw-semibold">
                        등록하기
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-5 text-center text-muted small">
        <div class="container">© 2025 FesLite Funding</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('fundingForm').addEventListener('submit', (e) => {
            alert(`🎉 펀딩이 등록되었습니다!`);
        });

        // 유료 선택 시 금액 입력 표시
        const feeFree = document.getElementById('feeFree');
        const feePaid = document.getElementById('feePaid');
        const feeAmountWrap = document.getElementById('feeAmountWrap');

        feeFree.addEventListener('change', () => {
            if (feeFree.checked) feeAmountWrap.style.display = 'none';
        });
        feePaid.addEventListener('change', () => {
            if (feePaid.checked) feeAmountWrap.style.display = 'block';
        });

        
        document.addEventListener('DOMContentLoaded', () => {
            const radios = document.querySelectorAll('input[name="feeType"]');
            const feeWrap = document.getElementById('feeAmountWrap');
            const feeInput = feeWrap.querySelector('input[name="festival_fee"]');
            const hiddenFee = document.getElementById('festival_fee_hidden');

            // ✅ 유료 선택 시 금액 입력칸 표시 / 무료 선택 시 숨김
            function toggleFeeBox() {
                const selected = document.querySelector('input[name="feeType"]:checked').value;
                if (selected === '유료') {
                feeWrap.style.display = 'block';
                } else {
                feeWrap.style.display = 'none';
                feeInput.value = ''; // 무료 선택 시 금액 초기화
                }
                updateFestivalFee(); // 변경 시 hidden값도 갱신
            }

            // ✅ 서버로 보낼 요금 데이터 구성
            function updateFestivalFee() {
                const selected = document.querySelector('input[name="feeType"]:checked').value;
                const feeValue = feeInput.value.trim();

                if (selected === '유료' && feeValue) {
                hiddenFee.value = `유료 (${feeValue}원)`;
                } else if (selected === '유료') {
                hiddenFee.value = '유료';
                } else {
                hiddenFee.value = '무료';
                }
            }

            // ✅ 이벤트 연결
            radios.forEach(radio => radio.addEventListener('change', toggleFeeBox));
            feeInput.addEventListener('input', updateFestivalFee);

            // ✅ 페이지 로드 시 초기 상태 세팅
            toggleFeeBox();
            });
        
    </script>
</body>

</html>
